name: Build, Validate, and Publish Python Package to PyPI

on:
  push:
    branches:
      - main
    tags:
      - "v**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint with Ruff
        run: ruff check src/

      - name: Run tests
        run: pytest -x -q

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    environment: Production
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools~=82.0.1" "wheel~=0.46.3" "build~=1.4.2" "twine~=6.2.0" "pyroma~=5.0.1" "check-wheel-contents~=0.6.3"

      - name: Build
        run: python -m build

      - name: Validate metadata (pyroma)
        run: python -m pyroma .

      - name: Validate with twine
        run: python -m twine check dist/*

      - name: Validate wheel contents
        run: check-wheel-contents dist/*.whl

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --skip-existing dist/*
